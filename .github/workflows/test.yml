name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build and type check (with sourcemaps for coverage)
        run: pnpm run build:dev

      - name: Lint extension
        run: pnpm run lint
        working-directory: packages/extension

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            packages/core/dist/
            packages/core/static/
            packages/cli/dist/
            packages/mcp/dist/
            packages/extension/dist/
            packages/vscode/dist/
          retention-days: 1

  core-cli-mcp:
    name: core+cli+mcp (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: packages

      - name: Run core tests
        run: pnpm run test
        working-directory: packages/core

      - name: Run CLI tests
        run: pnpm run test
        working-directory: packages/cli

      - name: Run MCP tests
        run: pnpm run test
        working-directory: packages/mcp

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux' && steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install-deps chromium chrome
        working-directory: packages/cli

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium chrome
        working-directory: packages/cli

      - name: Run CLI E2E tests (relay mode, .pw scripts)
        run: node dist/playwright-repl.js --relay --headless --replay examples/
        working-directory: packages/cli

      - name: Run CLI E2E tests (relay mode, JS scripts)
        run: node dist/playwright-repl.js --relay --headless --replay examples-js/
        working-directory: packages/cli

      - name: Run CLI E2E tests (connect mode via extension)
        run: node e2e/test-connect-replay.js
        working-directory: packages/cli

  extension:
    name: extension (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: packages

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux' && steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install-deps chromium chrome
        working-directory: packages/extension

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium chrome
        working-directory: packages/extension

      - name: Run unit tests
        run: pnpm run test:coverage
        working-directory: packages/extension

      - name: Run component tests
        run: pnpm run test:component
        working-directory: packages/extension

      - name: Run E2E tests
        run: pnpm exec playwright test
        working-directory: packages/extension

      - name: Merge coverage
        run: pnpm run coverage:merge
        working-directory: packages/extension

  vscode:
    name: vscode (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: nm-cache
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.nm-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: packages

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: |
            ~/.cache/ms-playwright
            ~/Library/Caches/ms-playwright
          key: playwright-${{ matrix.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        if: runner.os == 'Linux' && steps.pw-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install-deps chromium
        working-directory: packages/vscode

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium
        working-directory: packages/vscode

      - name: Run unit tests
        run: pnpm run test:coverage
        working-directory: packages/vscode

      - name: Run mock tests
        run: pnpm exec playwright test --config tests/playwright/playwright.config.ts --project default
        working-directory: packages/vscode
        timeout-minutes: 10

      - name: Merge coverage
        run: pnpm run coverage:merge
        working-directory: packages/vscode

      # VS Code E2E tests disabled — flaky on CI, works locally
