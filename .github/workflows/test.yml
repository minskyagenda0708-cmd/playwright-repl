name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    name: test (${{ matrix.os }}, node 22)
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and type check
        run: pnpm run build

      - name: Run tests
        run: pnpm -r run test

      - name: Lint extension
        run: pnpm run lint
        working-directory: packages/extension

      # Install Playwright browsers (all packages now use 1.59 stable)
      - name: Install Playwright browsers
        run: pnpm exec playwright install ${{ runner.os == 'Linux' && '--with-deps' || '' }} chromium chrome
        working-directory: packages/extension

      - name: Run extension component tests
        run: pnpm run test:component
        working-directory: packages/extension

      - name: Run CLI E2E tests
        run: node dist/playwright-repl.js --replay examples/ --silent
        working-directory: packages/cli

      - name: Run bridge replay E2E tests
        run: node e2e/test-bridge-replay.js
        working-directory: packages/cli

      # ─── Benchmark: Playwright vs pw-cli (playwright-tests, 1 worker) ─────
      - name: 'Benchmark: playwright-tests via Playwright (1 worker)'
        run: npx playwright test playwright-tests/ --workers 1 --reporter list
        working-directory: packages/runner/examples
        timeout-minutes: 10
        env:
          FORCE_COLOR: '1'

      - name: 'Benchmark: playwright-tests via pw-cli (1 worker)'
        run: node ../dist/pw-cli.js test playwright-tests/ --workers 1 --reporter list
        working-directory: packages/runner/examples
        timeout-minutes: 10
        env:
          FORCE_COLOR: '1'

      # ─── Benchmark: Playwright vs pw-cli vs bridge (todomvc, 1 worker) ───
      - name: 'Benchmark: todomvc via Playwright (1 worker)'
        run: npx playwright test todomvc/ --workers 1 --reporter list
        working-directory: packages/runner/examples
        timeout-minutes: 5
        env:
          FORCE_COLOR: '1'

      - name: 'Benchmark: todomvc via pw-cli (1 worker)'
        run: node ../dist/pw-cli.js test todomvc/ --workers 1 --reporter list
        working-directory: packages/runner/examples
        timeout-minutes: 5
        env:
          FORCE_COLOR: '1'

      - name: 'Benchmark: todomvc via bridge direct'
        run: node e2e/benchmark-bridge.js
        working-directory: packages/runner
        timeout-minutes: 5

      - name: 'Benchmark: todomvc via bridge direct (esbuild-wasm)'
        run: node e2e/benchmark-bridge.js
        working-directory: packages/runner
        timeout-minutes: 5
        env:
          PW_USE_ESBUILD_WASM: '1'

      - name: 'Benchmark: pw repl (CDP) vs pw repl-extension (bridge)'
        run: node packages/runner/script-examples/bench.js --headless
        timeout-minutes: 5

      - name: Run extension E2E tests
        run: pnpm exec playwright test
        working-directory: packages/extension

      - name: Run VS Code extension E2E tests
        run: ${{ runner.os == 'Linux' && 'xvfb-run' || '' }} pnpm exec playwright test --config e2e/playwright.config.ts
        working-directory: packages/vscode
        timeout-minutes: 5

      - name: Upload VS Code E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vscode-e2e-results-${{ matrix.os }}
          path: packages/vscode/e2e/test-results/
          retention-days: 7

      - name: Merge extension coverage
        run: pnpm run coverage:merge
        working-directory: packages/extension
