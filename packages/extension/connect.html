<!DOCTYPE html>
<html>
<head>
  <title>Playwright REPL - Connect</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #1e1e1e; color: #ccc; }
    .status { padding: 12px 16px; border-radius: 6px; margin-bottom: 16px; }
    .status.connecting { background: #2d2d2d; border: 1px solid #555; }
    .status.connected { background: #1b3a1b; border: 1px solid #4CAF50; color: #81c784; }
    .status.error { background: #3a1b1b; border: 1px solid #f44336; color: #ef9a9a; }
    .tab-list { margin-top: 16px; }
    .tab-item { display: flex; align-items: center; padding: 8px 12px; border: 1px solid #444; border-radius: 4px; margin-bottom: 8px; cursor: pointer; }
    .tab-item:hover { background: #333; }
    .tab-title { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tab-url { color: #888; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    button { padding: 8px 16px; border-radius: 4px; border: none; cursor: pointer; font-size: 14px; }
    .btn-connect { background: #4CAF50; color: white; }
    .btn-reject { background: #f44336; color: white; margin-left: 8px; }
    .btn-allow { background: #4CAF50; color: white; }
    h3 { margin: 16px 0 8px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <div id="status"></div>
  <div id="buttons"></div>
  <div id="tab-section"></div>

  <script type="module">
    const params = new URLSearchParams(window.location.search);
    const mcpRelayUrl = params.get('mcpRelayUrl');
    const clientRaw = params.get('client') || '{}';
    const newTab = params.get('newTab') === 'true';
    const token = params.get('token');

    const statusEl = document.getElementById('status');
    const buttonsEl = document.getElementById('buttons');
    const tabSectionEl = document.getElementById('tab-section');

    let clientInfo = 'unknown';
    try {
      const client = JSON.parse(clientRaw);
      clientInfo = `${client.name}/${client.version}`;
    } catch (e) {}

    function showStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function showError(message) {
      showStatus('error', message);
      buttonsEl.innerHTML = '';
      tabSectionEl.innerHTML = '';
    }

    async function connectToMCPRelay() {
      const response = await chrome.runtime.sendMessage({ type: 'connectToMCPRelay', mcpRelayUrl });
      if (!response.success) {
        showError(response.error);
        return false;
      }
      return true;
    }

    async function connectToTab(tabId, windowId) {
      buttonsEl.innerHTML = '';
      tabSectionEl.innerHTML = '';

      try {
        const response = await chrome.runtime.sendMessage({
          type: 'connectToTab',
          mcpRelayUrl,
          tabId,
          windowId,
        });

        if (response?.success) {
          showStatus('connected', `MCP client "${clientInfo}" connected.`);
        } else {
          showError(response?.error || `MCP client "${clientInfo}" failed to connect.`);
        }
      } catch (e) {
        showError(`MCP client "${clientInfo}" failed to connect: ${e}`);
      }
    }

    async function loadTabs() {
      const response = await chrome.runtime.sendMessage({ type: 'getTabs' });
      if (!response.success) {
        showError('Failed to load tabs: ' + response.error);
        return;
      }

      tabSectionEl.innerHTML = '<h3>Select page to expose to MCP server:</h3>';
      for (const tab of response.tabs) {
        const item = document.createElement('div');
        item.className = 'tab-item';
        item.innerHTML = `
          <div style="flex:1;min-width:0">
            <div class="tab-title">${tab.title || ''}</div>
            <div class="tab-url">${tab.url || ''}</div>
          </div>
          <button class="btn-connect">Connect</button>
        `;
        item.querySelector('button').onclick = () => connectToTab(tab.id, tab.windowId);
        tabSectionEl.appendChild(item);
      }
    }

    // Listen for connection timeout
    chrome.runtime.onMessage.addListener((message) => {
      if (message.type === 'connectionTimeout')
        showError('Connection timed out.');
    });

    // ── Main flow ──
    async function main() {
      if (!mcpRelayUrl) {
        showError('Missing mcpRelayUrl parameter in URL.');
        return;
      }

      try {
        const host = new URL(mcpRelayUrl).hostname;
        if (host !== '127.0.0.1' && host !== '[::1]') {
          showError(`Only loopback connections allowed. Received host: ${host}`);
          return;
        }
      } catch (e) {
        showError(`Invalid mcpRelayUrl: ${mcpRelayUrl}`);
        return;
      }

      showStatus('connecting', `Playwright MCP started from "${clientInfo}" is trying to connect.`);

      // Auto-connect if token matches (no UI needed)
      // For now we don't implement token auth — just connect
      const ok = await connectToMCPRelay();
      if (!ok) return;

      if (newTab) {
        // browser_navigate: simple allow/reject
        buttonsEl.innerHTML = `
          <button class="btn-allow" id="allow">Allow</button>
          <button class="btn-reject" id="reject">Reject</button>
        `;
        document.getElementById('allow').onclick = () => connectToTab();
        document.getElementById('reject').onclick = () => showError('Connection rejected. This tab can be closed.');
      } else {
        // Show tab list
        buttonsEl.innerHTML = `<button class="btn-reject" id="reject">Reject</button>`;
        document.getElementById('reject').onclick = () => showError('Connection rejected. This tab can be closed.');
        await loadTabs();
      }
    }

    main();
  </script>
</body>
</html>
