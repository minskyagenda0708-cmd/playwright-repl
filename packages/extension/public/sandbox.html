<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
(function () {
  // Chain-based proxy: builds up [{method, args}, ...] and sends the full chain
  // only when awaited — so page.locator('.btn').click() works without serializing Locator.
  function createPageProxy() {
    function makeChainProxy(chain) {
      var promise = null;
      function getPromise() {
        if (!promise) {
          promise = new Promise(function (resolve, reject) {
            var id = Math.random().toString(36).slice(2);
            function handler(e) {
              if (!e.data || e.data.type !== 'page-result' || e.data.id !== id) return;
              window.removeEventListener('message', handler);
              if (e.data.error) reject(e.data.error);
              else resolve(e.data.result);
            }
            window.addEventListener('message', handler);
            var serialized = chain.map(function (step) {
              return {
                method: step.method,
                args: step.args.map(function (a) {
                  if (typeof a === 'function') return { __type: 'Function', source: a.toString() };
                  return a;
                })
              };
            });
            window.parent.postMessage({ type: 'page-call', chain: serialized, id: id }, '*');
          });
        }
        return promise;
      }
      return new Proxy({}, {
        get: function (_, prop) {
          if (typeof prop !== 'string') return undefined;
          if (prop === 'then') return function (res, rej) { return getPromise().then(res, rej); };
          if (prop === 'catch') return function (rej) { return getPromise().catch(rej); };
          if (prop === 'finally') return function (fn) { return getPromise().finally(fn); };
          return function () {
            var args = Array.prototype.slice.call(arguments);
            return makeChainProxy(chain.concat([{ method: prop, args: args }]));
          };
        }
      });
    }
    return new Proxy({}, {
      get: function (_, method) {
        if (typeof method !== 'string') return undefined;
        if (method === 'then' || method === 'catch' || method === 'finally') return undefined;
        if (method === 'toString' || method === 'valueOf') return function () { return '[Page]'; };
        // Router: page.evaluate / page.evaluateHandle bypass the chain proxy —
        // the function source is sent directly to background.ts which calls page.evaluate.
        if (method === 'evaluate' || method === 'evaluateHandle') {
          return function (fnOrString, arg) {
            return new Promise(function (resolve, reject) {
              var id = Math.random().toString(36).slice(2);
              var source = typeof fnOrString === 'function' ? fnOrString.toString() : String(fnOrString);
              var isString = typeof fnOrString === 'string';
              function handler(e) {
                if (!e.data || e.data.type !== 'page-evaluate-result' || e.data.id !== id) return;
                window.removeEventListener('message', handler);
                if (e.data.error) reject(new Error(e.data.error));
                else resolve(e.data.result);
              }
              window.addEventListener('message', handler);
              window.parent.postMessage({ type: 'page-evaluate', method: method, source: source, isString: isString, arg: arg, id: id }, '*');
            });
          };
        }
        return function () {
          var args = Array.prototype.slice.call(arguments);
          return makeChainProxy([{ method: method, args: args }]);
        };
      }
    });
  }

  // expect(chainProxy).toBeVisible() appends __expect__ to the chain so the
  // assertion runs on the parent side where the real Playwright Locator lives.
  function createExpect() {
    return function expect(chainProxy) {
      return new Proxy({}, {
        get: function (_, matcher) {
          if (typeof matcher !== 'string') return undefined;
          return function () {
            var args = Array.prototype.slice.call(arguments);
            return chainProxy.__expect__(matcher, ...args);
          };
        }
      });
    };
  }

  function toSerializedValue(v, depth) {
    if (v === null) return { __type: 'null' };
    if (v === undefined) return { __type: 'undefined' };
    var t = typeof v;
    if (t === 'string')  return { __type: 'string',  v: v };
    if (t === 'number')  return { __type: 'number',  v: v };
    if (t === 'boolean') return { __type: 'boolean', v: v };
    if (t === 'function') return { __type: 'function', name: v.name || '(anonymous)' };
    if (t === 'object') {
      var cls = (v.constructor && v.constructor.name) || 'Object';
      if (depth <= 0) return { __type: 'ref', cls: cls };
      var isArr = Array.isArray(v);
      var keys = Object.keys(v).slice(0, 30);
      var props = {};
      for (var i = 0; i < keys.length; i++) {
        try { props[keys[i]] = toSerializedValue(v[keys[i]], depth - 1); }
        catch (_) { props[keys[i]] = { __type: 'error' }; }
      }
      if (isArr) return { __type: 'array', cls: cls, len: v.length, props: props };
      return { __type: 'object', cls: cls, props: props };
    }
    return { __type: 'string', v: String(v) };
  }

  var AsyncFunction = Object.getPrototypeOf(async function () {}).constructor;

  window.addEventListener('message', async function (e) {
    if (!e.data || e.data.type !== 'run-code') return;
    var code = e.data.code;
    var id = e.data.id;
    var page = createPageProxy();
    var expect = createExpect();
    try {
      var trimmed = code.trim().replace(/;+$/, '');
      var isFnExpr = /^(async\s*)?\(|^(async\s+)?function\b/.test(trimmed);
      var body;
      if (isFnExpr) {
        body = 'return await (' + trimmed + ')(page, expect)';
      } else {
        // Try as expression to capture return value, else run as statements
        try {
          new AsyncFunction('page', 'expect', 'return (' + trimmed + ')');
          body = 'return (' + trimmed + ')';
        } catch (_) {
          // Multi-statement: try returning the last line
          var lines = trimmed.split('\n');
          var lastLine = lines[lines.length - 1].trim().replace(/;+$/, '');
          var prevLines = lines.slice(0, -1).join('\n');
          try {
            new AsyncFunction('page', 'expect', prevLines + '\nreturn (' + lastLine + ')');
            body = prevLines + '\nreturn (' + lastLine + ')';
          } catch (_) {
            body = trimmed;
          }
        }
      }
      var fn = new AsyncFunction('page', 'expect', body);
      var result = await fn(page, expect);
      if (result === page) {
        window.parent.postMessage({ type: 'run-code-result', id: id, result: 'Playwright Page — use page.url(), page.title(), page.locator(), etc.' }, '*');
      } else if (result !== null && result !== undefined && typeof result === 'object') {
        window.parent.postMessage({ type: 'run-code-result', id: id, value: toSerializedValue(result, 2) }, '*');
      } else if (typeof result === 'function') {
        window.parent.postMessage({ type: 'run-code-result', id: id, error: 'Invalid function' }, '*');
      } else {
        var text = result != null ? String(result) : 'Done';
        window.parent.postMessage({ type: 'run-code-result', id: id, result: text }, '*');
      }
    } catch (err) {
      window.parent.postMessage({ type: 'run-code-result', id: id, error: String(err) }, '*');
    }
  });
})();
</script>
</body>
</html>
