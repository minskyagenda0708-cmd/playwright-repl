<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playwright REPL</title>
  <script type="module" crossorigin src="/panel.js"></script>
  <link rel="stylesheet" crossorigin href="/panel.css">
</head>
<body>
  <div id="header">
    <span class="title">Playwright REPL</span>
    <span id="connection-indicator">
      <span id="connection-dot"></span>
      <span id="connection-domain">Not connected</span>
    </span>
  </div>

  <div id="toolbar">
    <button id="attach-btn" title="Attach to current tab">Attach</button>
    <div class="separator"></div>
    <button id="run-btn" title="Run script">&#9654; Run</button>
    <button id="step-btn" title="Step through">&#9654;| Step</button>
    <button id="record-btn" class="record" title="Record actions">&#9679; Record</button>
    <div class="separator"></div>
    <button id="open-btn" title="Open session">Open</button>
    <button id="save-btn" title="Save session">Save</button>
    <button id="export-btn" title="Export to Playwright test">Export</button>
    <button id="copy-btn" title="Copy to clipboard">Copy</button>
  </div>

  <div id="editor-section">
    <div id="editor-header">
      <span id="editor-filename">session.pw</span>
      <span id="editor-lines">0 lines</span>
    </div>
    <div id="editor-container">
      <div id="line-numbers"></div>
      <textarea id="editor" spellcheck="false" placeholder="# Write your script here&#10;goto https://example.com&#10;snapshot&#10;click e1"></textarea>
    </div>
  </div>

  <div id="console-section">
    <div id="console-header">
      <span>Console</span>
      <span id="console-stats"></span>
    </div>
    <div id="output"></div>
  </div>

  <div id="input-row">
    <span class="prompt">pw&gt;</span>
    <input id="command-input" type="text" placeholder="Type a command..." autofocus>
  </div>

</body>
</html>
